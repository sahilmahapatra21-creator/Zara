<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8618c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f4a0bc;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Rounded background -->
  <rect width="192" height="192" rx="45" fill="url(#bgGradient)"/>
  
  <!-- Glow effect -->
  <rect width="192" height="192" rx="45" fill="url(#glowGradient)"/>
  
  <!-- Large heart symbol -->
  <g transform="translate(96, 96)">
    <!-- Heart shape -->
    <path d="M 0,-10 C -15,-25 -35,-20 -35,0 C -35,20 0,45 0,45 C 0,45 35,20 35,0 C 35,-20 15,-25 0,-10 Z" 
          fill="#ffffff" 
          filter="drop-shadow(0 4px 8px rgba(0,0,0,0.1))"/>
    
    <!-- Inner shine -->
    <path d="M -5,-8 C -12,-15 -20,-12 -20,-2 C -20,8 0,25 0,25 C 0,20 8,10 8,-2 C 8,-12 2,-15 -5,-8 Z" 
          fill="#ffccdd" 
          opacity="0.6"/>
  </g>
  
  <!-- Shine effect on top -->
  <ellipse cx="60" cy="60" rx="30" ry="30" fill="#ffffff" opacity="0.15"/>
</svg>